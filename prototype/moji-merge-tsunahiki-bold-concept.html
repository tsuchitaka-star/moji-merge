<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>モジマージ 綱引き - 太フチ版</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
  color: #111;
  background:
    radial-gradient(circle at 16% 12%, rgba(255,255,255,.18), transparent 22%),
    radial-gradient(circle at 88% 34%, rgba(255,212,92,.18), transparent 26%),
    linear-gradient(135deg, #82616d 0%, #6e5365 48%, #59485d 100%);
  padding: 14px;
}
.app {
  width: min(900px, 100%);
  margin: 0 auto;
}
.title {
  text-align: center;
  margin: 4px 0 16px;
  transform: rotate(-1deg);
}
.title h1 {
  margin: 0;
  color: #fff;
  font-size: clamp(34px, 7vw, 68px);
  line-height: .95;
  font-weight: 1000;
  letter-spacing: .02em;
  -webkit-text-stroke: 8px #050505;
  paint-order: stroke fill;
  text-shadow: 0 6px 0 #050505, 0 14px 28px rgba(0,0,0,.32);
}
.title .red {
  color: #ff1111;
  -webkit-text-stroke: 8px #fff;
  filter: drop-shadow(0 0 0 #000) drop-shadow(5px 5px 0 #000) drop-shadow(-5px -5px 0 #000);
}
.subtitle {
  display: inline-block;
  margin-top: 12px;
  padding: 5px 14px 6px;
  background: #111;
  color: #ffe76a;
  border: 3px solid #fff;
  border-radius: 999px;
  font-weight: 900;
  font-size: 13px;
  box-shadow: 0 5px 0 rgba(0,0,0,.35);
}
.hud {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 10px;
}
.pill {
  background: #151313;
  border: 4px solid #fff;
  border-radius: 14px;
  color: #fff;
  text-align: center;
  padding: 7px 8px;
  font-size: 13px;
  font-weight: 900;
  box-shadow: 0 5px 0 rgba(0,0,0,.36);
}
.pill b {
  color: #ffeb35;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
.meter {
  height: 18px;
  position: relative;
  background: #171313;
  border: 3px solid #fff;
  border-radius: 999px;
  margin-bottom: 18px;
  box-shadow: 0 5px 0 rgba(0,0,0,.35);
  overflow: hidden;
}
.meter-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #ff1010, #ffde2e);
  border-radius: 999px;
  transition: width .15s ease;
}
.stage-wrap {
  position: relative;
}
canvas {
  display: block;
  width: 100%;
  aspect-ratio: 900 / 460;
  background: transparent;
  border: 6px solid #090909;
  border-radius: 24px;
  box-shadow: 0 10px 0 #090909, 0 22px 38px rgba(0,0,0,.28);
}
.battle-words {
  margin-top: 22px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.word-card {
  margin-top: 22px;
  padding: 17px 12px 20px;
  background: #fff7e7;
  border: 6px solid #080808;
  border-radius: 22px;
  text-align: center;
  box-shadow: 0 9px 0 #080808, 0 20px 30px rgba(0,0,0,.22);
  transform: rotate(.45deg);
}
.word-card.cpu-card {
  background: #eef5ff;
  transform: rotate(-.45deg);
}
.side-label {
  display: inline-block;
  margin-bottom: 4px;
  color: #fff;
  font-weight: 1000;
  font-size: 18px;
  -webkit-text-stroke: 5px #050505;
  paint-order: stroke fill;
}
.cpu-progress {
  height: 14px;
  margin: 12px auto 0;
  max-width: 320px;
  border: 3px solid #050505;
  border-radius: 999px;
  background: #fff;
  overflow: hidden;
}
.cpu-progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #3d7cff, #ff3030);
}
.rush {
  margin-top: 10px;
  min-height: 28px;
  color: #ffeb35;
  font-size: 18px;
  font-weight: 1000;
  -webkit-text-stroke: 4px #050505;
  paint-order: stroke fill;
}
.badge {
  display: inline-block;
  padding: 2px 11px;
  border-radius: 999px;
  border: 3px solid #fff;
  background: #111;
  color: #ffdf35;
  font-weight: 900;
  font-size: 13px;
  box-shadow: 0 2px 0 #000;
}
.kana {
  margin-top: 8px;
  color: #fff;
  font-size: clamp(42px, 9vw, 82px);
  line-height: .98;
  font-weight: 1000;
  -webkit-text-stroke: 8px #060606;
  paint-order: stroke fill;
  text-shadow: 0 6px 0 #060606;
}
.roma {
  margin-top: 12px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: clamp(20px, 4vw, 30px);
  font-weight: 1000;
  letter-spacing: 2px;
}
.typed { color: #e60012; }
.foot {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  margin-top: 16px;
  color: #fff;
  font-size: 12px;
  font-weight: 900;
  text-shadow: 2px 2px 0 #000;
}
.hidden-input {
  position: fixed;
  left: -1000px;
  top: 0;
  width: 1px;
  height: 1px;
  opacity: .01;
}
.overlay {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  background: rgba(20, 14, 18, .82);
  border-radius: 18px;
}
.overlay h2 {
  margin: 0;
  color: #fff;
  font-size: clamp(46px, 8vw, 82px);
  font-weight: 1000;
  -webkit-text-stroke: 8px #000;
  paint-order: stroke fill;
  text-shadow: 0 7px 0 #000;
}
.overlay p {
  margin: 0;
  color: #ffe76a;
  font-size: 18px;
  font-weight: 900;
  text-shadow: 2px 2px 0 #000;
}
button {
  appearance: none;
  padding: 9px 24px;
  border: 4px solid #fff;
  border-radius: 13px;
  background: #e60012;
  color: #fff;
  font: inherit;
  font-weight: 1000;
  cursor: pointer;
  box-shadow: 0 6px 0 #000;
}
@media (max-width: 600px) {
  body { padding: 10px; }
  .hud { grid-template-columns: 1fr; }
  .battle-words { grid-template-columns: 1fr; }
  .foot { flex-direction: column; align-items: center; text-align: center; }
  .title h1 { -webkit-text-stroke-width: 6px; }
  .kana { -webkit-text-stroke-width: 6px; }
}
</style>
</head>
<body>
<main class="app" id="app">
  <section class="title">
    <h1>モジマージ<br><span class="red">綱引き！</span></h1>
    <div class="subtitle">45秒勝負 ／ 打てば打つほど味方が増える</div>
  </section>

  <section class="hud">
    <div class="pill">COMBO <b id="combo">0</b></div>
    <div class="pill">YOU <b id="power">1人</b></div>
    <div class="pill">TIME <b id="time">45.0</b></div>
  </section>
  <div class="meter"><div class="meter-fill" id="meter"></div></div>

  <section class="stage-wrap">
    <canvas id="stage" width="900" height="460"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="result">WIN!</h2>
      <p id="resultSub">相手を自陣へ引き込んだ</p>
      <button id="retry">もう一度</button>
    </div>
  </section>

  <section class="battle-words">
    <div class="word-card player-card">
      <div class="side-label">YOU</div>
      <div class="badge" id="badge">L1</div>
      <div class="kana" id="kana">猫</div>
      <div class="roma" id="roma">neko</div>
      <div class="rush" id="rush">5 COMBOで応援ラッシュ</div>
    </div>
    <div class="word-card cpu-card">
      <div class="side-label">CPU</div>
      <div class="badge" id="cpuBadge">L1</div>
      <div class="kana" id="cpuKana">犬</div>
      <div class="roma" id="cpuRoma">inu</div>
      <div class="cpu-progress"><div class="cpu-progress-fill" id="cpuProgress"></div></div>
    </div>
  </section>

  <section class="foot">
    <div>ローマ字で入力。スマホは画面タップでキーボード表示。</div>
    <div>Typed: <span class="typed" id="typed">_</span></div>
  </section>
  <input class="hidden-input" id="mobileInput" autocomplete="off" autocapitalize="none" spellcheck="false">
</main>

<script>
const BASIC_WORDS = [
  { k: '猫', r: 'neko', lv: 1 }, { k: '犬', r: 'inu', lv: 1 }, { k: '空', r: 'sora', lv: 1 }, { k: '山', r: 'yama', lv: 1 },
  { k: '川', r: 'kawa', lv: 1 }, { k: '海', r: 'umi', lv: 1 }, { k: '雨', r: 'ame', lv: 1 }, { k: '風', r: 'kaze', lv: 1 },
  { k: '月', r: 'tsuki', lv: 1 }, { k: '星', r: 'hoshi', lv: 1 }, { k: '花', r: 'hana', lv: 1 }, { k: '森', r: 'mori', lv: 1 },
  { k: '土', r: 'tsuchi', lv: 1 }, { k: '酒', r: 'sake', lv: 1 }, { k: '夢', r: 'yume', lv: 1 }, { k: '橋', r: 'hashi', lv: 1 },
  { k: '駅', r: 'eki', lv: 1 }, { k: '道', r: 'michi', lv: 1 }, { k: '本', r: 'hon', lv: 1 }, { k: '歌', r: 'uta', lv: 1 },
  { k: '光', r: 'hikari', lv: 2 }, { k: '時間', r: 'jikan', lv: 2 }, { k: '言葉', r: 'kotoba', lv: 2 }, { k: '魔法', r: 'mahou', lv: 2 },
  { k: '仲間', r: 'nakama', lv: 2 }, { k: '勝負', r: 'shoubu', lv: 2 }, { k: '作戦', r: 'sakusen', lv: 2 }, { k: '練習', r: 'renshuu', lv: 2 },
  { k: '引力', r: 'inryoku', lv: 2 }, { k: '集中', r: 'shuuchuu', lv: 2 }, { k: '連打', r: 'renda', lv: 2 }, { k: '反撃', r: 'hangeki', lv: 2 },
  { k: '閃き', r: 'hirameki', lv: 3 }, { k: '対決', r: 'taiketsu', lv: 3 }, { k: '応援団', r: 'ouendan', lv: 3 }, { k: '土煙', r: 'tsuchikemuri', lv: 3 },
  { k: '大逆転', r: 'daigyakuten', lv: 4 }, { k: '言葉の力', r: 'kotobanochikara', lv: 4 }, { k: '絶対勝利', r: 'zettaishouri', lv: 4 },
];

const SEASONS = [
  ['春', 'haru'], ['夏', 'natsu'], ['秋', 'aki'], ['冬', 'fuyu'],
  ['朝', 'asa'], ['昼', 'hiru'], ['夕方', 'yuugata'], ['夜', 'yoru'],
];
const NATURE = [
  ['空', 'sora'], ['海', 'umi'], ['山', 'yama'], ['川', 'kawa'], ['森', 'mori'], ['風', 'kaze'], ['雨', 'ame'], ['雲', 'kumo'],
  ['月', 'tsuki'], ['星', 'hoshi'], ['花', 'hana'], ['道', 'michi'], ['光', 'hikari'], ['影', 'kage'], ['音', 'oto'], ['泉', 'izumi'],
  ['草原', 'sougen'], ['砂浜', 'sunahama'], ['湖', 'mizuumi'], ['丘', 'oka'], ['畑', 'hatake'], ['庭', 'niwa'], ['港', 'minato'], ['街', 'machi'],
];
const COLORS = [
  ['赤い', 'akai'], ['青い', 'aoi'], ['白い', 'shiroi'], ['黒い', 'kuroi'], ['丸い', 'marui'], ['小さい', 'chiisai'],
  ['大きい', 'ookii'], ['明るい', 'akarui'], ['静かな', 'shizukana'], ['新しい', 'atarashii'], ['古い', 'furui'], ['強い', 'tsuyoi'],
];
const OBJECTS = [
  ['花', 'hana'], ['傘', 'kasa'], ['靴', 'kutsu'], ['机', 'tsukue'], ['椅子', 'isu'], ['時計', 'tokei'], ['鞄', 'kaban'], ['帽子', 'boushi'],
  ['船', 'fune'], ['車', 'kuruma'], ['電車', 'densha'], ['自転車', 'jitensha'], ['鍵', 'kagi'], ['手紙', 'tegami'], ['写真', 'shashin'], ['絵本', 'ehon'],
  ['太鼓', 'taiko'], ['笛', 'fue'], ['旗', 'hata'], ['石', 'ishi'], ['木', 'ki'], ['紙', 'kami'], ['箱', 'hako'], ['地図', 'chizu'],
];
const PLACES = [
  ['学校', 'gakkou'], ['公園', 'kouen'], ['図書館', 'toshokan'], ['駅前', 'ekimae'], ['教室', 'kyoushitsu'], ['体育館', 'taiikukan'],
  ['商店街', 'shoutengai'], ['台所', 'daidokoro'], ['庭', 'niwa'], ['山道', 'yamamichi'], ['海辺', 'umibe'], ['川辺', 'kawabe'],
  ['会社', 'kaisha'], ['病院', 'byouin'], ['市場', 'ichiba'], ['神社', 'jinja'], ['空港', 'kuukou'], ['港町', 'minatomachi'],
];
const ACTIONS = [
  ['勉強', 'benkyou'], ['練習', 'renshuu'], ['散歩', 'sanpo'], ['読書', 'dokusho'], ['応援', 'ouen'], ['会議', 'kaigi'],
  ['料理', 'ryouri'], ['掃除', 'souji'], ['買物', 'kaimono'], ['運動', 'undou'], ['休憩', 'kyuukei'], ['発表', 'happyou'],
  ['相談', 'soudan'], ['準備', 'junbi'], ['確認', 'kakunin'], ['挑戦', 'chousen'], ['作戦会議', 'sakusenkaigi'], ['集中練習', 'shuuchuurenshuu'],
];
const GAME_NOUNS = [
  ['味方', 'mikata'], ['相手', 'aite'], ['勝利', 'shouri'], ['作戦', 'sakusen'], ['集中力', 'shuuchuuryoku'], ['反射神経', 'hanshashinkei'],
  ['入力速度', 'nyuuryokusokudo'], ['応援合戦', 'ouengassen'], ['最後の一手', 'saigonoitte'], ['逆転勝負', 'gyakutenshoubu'],
];
const GAME_VERBS = [
  ['増える', 'fueru'], ['集まる', 'atsumaru'], ['高まる', 'takamaru'], ['光る', 'hikaru'], ['決まる', 'kimaru'],
  ['追いつく', 'oitsuku'], ['耐える', 'taeru'], ['引き寄せる', 'hikiyoseru'], ['巻き返す', 'makikaesu'], ['勝ち切る', 'kachikiru'],
];

function pushWord(words, seen, k, r, lv) {
  if (seen.has(k)) return;
  seen.add(k);
  words.push({ k, r, lv });
}

function makeWords(count) {
  const words = [];
  const seen = new Set();
  BASIC_WORDS.forEach(w => pushWord(words, seen, w.k, w.r, w.lv));
  for (const [season, seasonR] of SEASONS) {
    for (const [nature, natureR] of NATURE) {
      pushWord(words, seen, season + 'の' + nature, seasonR + 'no' + natureR, 2);
    }
  }
  for (const [color, colorR] of COLORS) {
    for (const [object, objectR] of OBJECTS) {
      pushWord(words, seen, color + object, colorR + objectR, 2);
    }
  }
  for (const [place, placeR] of PLACES) {
    for (const [action, actionR] of ACTIONS) {
      pushWord(words, seen, place + 'で' + action, placeR + 'de' + actionR, actionR.length > 8 ? 4 : 3);
    }
  }
  for (const [noun, nounR] of GAME_NOUNS) {
    for (const [verb, verbR] of GAME_VERBS) {
      pushWord(words, seen, noun + 'が' + verb, nounR + 'ga' + verbR, 4);
    }
  }
  return words.slice(0, count);
}

const SYLLABLE_VARIANTS = {
  'a':['a'],'i':['i'],'u':['u'],'e':['e'],'o':['o'],
  'ka':['ka'],'ki':['ki'],'ku':['ku'],'ke':['ke'],'ko':['ko'],
  'ga':['ga'],'gi':['gi'],'gu':['gu'],'ge':['ge'],'go':['go'],
  'sa':['sa'],'shi':['shi','si'],'si':['shi','si'],'su':['su'],'se':['se'],'so':['so'],
  'za':['za'],'ji':['ji','zi'],'zi':['ji','zi'],'zu':['zu'],'ze':['ze'],'zo':['zo'],
  'ta':['ta'],'chi':['chi','ti'],'ti':['chi','ti'],'tsu':['tsu','tu'],'tu':['tsu','tu'],'te':['te'],'to':['to'],
  'da':['da'],'de':['de'],'do':['do'],
  'na':['na'],'ni':['ni'],'nu':['nu'],'ne':['ne'],'no':['no'],
  'ha':['ha'],'hi':['hi'],'fu':['fu','hu'],'hu':['fu','hu'],'he':['he'],'ho':['ho'],
  'ba':['ba'],'bi':['bi'],'bu':['bu'],'be':['be'],'bo':['bo'],
  'pa':['pa'],'pi':['pi'],'pu':['pu'],'pe':['pe'],'po':['po'],
  'ma':['ma'],'mi':['mi'],'mu':['mu'],'me':['me'],'mo':['mo'],
  'ya':['ya'],'yu':['yu'],'yo':['yo'],
  'ra':['ra'],'ri':['ri'],'ru':['ru'],'re':['re'],'ro':['ro'],
  'wa':['wa'],'wo':['wo','o'],
  'kya':['kya'],'kyu':['kyu'],'kyo':['kyo'],
  'gya':['gya'],'gyu':['gyu'],'gyo':['gyo'],
  'sha':['sha','sya'],'sya':['sha','sya'],
  'shu':['shu','syu'],'syu':['shu','syu'],
  'sho':['sho','syo'],'syo':['sho','syo'],
  'ja':['ja','jya','zya'],'jya':['ja','jya','zya'],'zya':['ja','jya','zya'],
  'ju':['ju','jyu','zyu'],'jyu':['ju','jyu','zyu'],'zyu':['ju','jyu','zyu'],
  'jo':['jo','jyo','zyo'],'jyo':['jo','jyo','zyo'],'zyo':['jo','jyo','zyo'],
  'cha':['cha','tya','cya'],'tya':['cha','tya','cya'],'cya':['cha','tya','cya'],
  'chu':['chu','tyu','cyu'],'tyu':['chu','tyu','cyu'],'cyu':['chu','tyu','cyu'],
  'cho':['cho','tyo','cyo'],'tyo':['cho','tyo','cyo'],'cyo':['cho','tyo','cyo'],
  'nya':['nya'],'nyu':['nyu'],'nyo':['nyo'],
  'hya':['hya'],'hyu':['hyu'],'hyo':['hyo'],
  'bya':['bya'],'byu':['byu'],'byo':['byo'],
  'pya':['pya'],'pyu':['pyu'],'pyo':['pyo'],
  'mya':['mya'],'myu':['myu'],'myo':['myo'],
  'rya':['rya'],'ryu':['ryu'],'ryo':['ryo'],
};

function tokenizeRoma(roma) {
  const tokens = [];
  const VOWELS = 'aiueoy';
  let i = 0;
  while (i < roma.length) {
    const c = roma[i];
    if (i + 1 < roma.length && c === roma[i+1] && !VOWELS.includes(c) && c !== 'n') {
      tokens.push([c]);
      i++;
      continue;
    }
    const c3 = roma.slice(i, i+3);
    if (SYLLABLE_VARIANTS[c3]) {
      tokens.push(SYLLABLE_VARIANTS[c3]);
      i += 3;
      continue;
    }
    const c2 = roma.slice(i, i+2);
    if (SYLLABLE_VARIANTS[c2]) {
      tokens.push(SYLLABLE_VARIANTS[c2]);
      i += 2;
      continue;
    }
    if (c === 'n') {
      tokens.push(['n','nn']);
      i++;
      continue;
    }
    if (SYLLABLE_VARIANTS[c]) {
      tokens.push(SYLLABLE_VARIANTS[c]);
      i++;
      continue;
    }
    tokens.push([c]);
    i++;
  }
  return tokens;
}

function checkInput(typed, tokens, idx) {
  idx = idx || 0;
  if (typed === '' && idx >= tokens.length) return 'complete';
  if (idx >= tokens.length) return 'invalid';
  if (typed === '') return 'prefix';
  let canPrefix = false;
  for (const opt of tokens[idx]) {
    if (typed.startsWith(opt)) {
      const r = checkInput(typed.slice(opt.length), tokens, idx + 1);
      if (r === 'complete') return 'complete';
      if (r === 'prefix') canPrefix = true;
    } else if (opt.startsWith(typed)) {
      canPrefix = true;
    }
  }
  return canPrefix ? 'prefix' : 'invalid';
}

function buildHint(typed, tokens) {
  let consumed = 0, rest = typed;
  outer: while (consumed < tokens.length && rest.length > 0) {
    for (const opt of tokens[consumed]) {
      if (rest.startsWith(opt)) {
        rest = rest.slice(opt.length);
        consumed++;
        continue outer;
      }
    }
    break;
  }
  let hint = '';
  if (rest.length > 0 && consumed < tokens.length) {
    for (const opt of tokens[consumed]) {
      if (opt.startsWith(rest)) {
        hint = opt.slice(rest.length);
        consumed++;
        break;
      }
    }
  }
  hint += tokens.slice(consumed).map(t => t[0]).join('');
  return hint;
}

const WORDS = makeWords(500).map(w => ({ ...w, tokens: tokenizeRoma(w.r) }));
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const ui = {
  combo: document.getElementById('combo'),
  power: document.getElementById('power'),
  time: document.getElementById('time'),
  meter: document.getElementById('meter'),
  badge: document.getElementById('badge'),
  kana: document.getElementById('kana'),
  roma: document.getElementById('roma'),
  typed: document.getElementById('typed'),
  rush: document.getElementById('rush'),
  cpuBadge: document.getElementById('cpuBadge'),
  cpuKana: document.getElementById('cpuKana'),
  cpuRoma: document.getElementById('cpuRoma'),
  cpuProgress: document.getElementById('cpuProgress'),
  overlay: document.getElementById('overlay'),
  result: document.getElementById('result'),
  resultSub: document.getElementById('resultSub'),
  retry: document.getElementById('retry'),
  input: document.getElementById('mobileInput'),
};

const W = 900;
const H = 460;
let state;

function pickWord() {
  const maxLv = state.combo >= 10 ? 4 : state.combo >= 6 ? 3 : state.combo >= 3 ? 2 : 1;
  const pool = WORDS.filter(w => w.lv <= maxLv);
  return pool[Math.floor(Math.random() * pool.length)];
}

function reset() {
  state = {
    word: WORDS[0],
    typed: '',
    combo: 0,
    rope: 0,
    start: performance.now(),
    last: performance.now(),
    over: null,
    hit: 0,
    cpuHit: 0,
    shake: 0,
    sparks: [],
    playerPeople: 1,
    cpuPeople: 1,
    cpuWord: WORDS[1],
    cpuTyped: '',
    cpuProgress: 0,
    cpuSpeed: 0.00040,
    rushUntil: 0,
    message: '5 COMBOで応援ラッシュ',
    messageUntil: 0,
  };
  state.word = pickWord();
  state.cpuWord = pickWord();
  ui.overlay.style.display = 'none';
  ui.input.value = '';
  focusInput();
}

function focusInput() {
  ui.input.focus({ preventScroll: true });
}

function level() {
  if (state.combo >= 10) return 4;
  if (state.combo >= 6) return 3;
  if (state.combo >= 3) return 2;
  return 1;
}

function finishWord() {
  const lv = state.word.lv;
  const rushActive = performance.now() < state.rushUntil;
  const addedPeople = lv * (rushActive ? 2 : 1);
  state.combo++;
  if (state.combo > 0 && state.combo % 5 === 0) {
    state.rushUntil = performance.now() + 4300;
    state.message = '応援ラッシュ！人数追加2倍';
    state.messageUntil = performance.now() + 1600;
  } else {
    state.message = '+' + addedPeople + '人で引き寄せた！';
    state.messageUntil = performance.now() + 900;
  }
  state.playerPeople = Math.min(60, state.playerPeople + addedPeople);
  state.rope += 0.045 * addedPeople;
  state.hit = 1;
  state.shake = 1;
  burst(260, 236, lv + addedPeople);
  state.word = pickWord();
  state.typed = '';
  ui.input.value = '';
}

function failInput() {
  state.combo = 0;
  state.cpuHit = 0.5;
  state.shake = 0.55;
  state.message = 'ミス！COMBOリセット';
  state.messageUntil = performance.now() + 1000;
}

function cpuFinishWord() {
  const lv = state.cpuWord.lv;
  state.cpuPeople = Math.min(60, state.cpuPeople + lv);
  state.rope -= 0.045 * lv;
  state.cpuHit = 1;
  state.shake = Math.max(state.shake, 0.65);
  burst(640, 236, lv);
  state.cpuWord = pickWord();
  state.cpuTyped = '';
  state.cpuProgress = 0;
  state.cpuSpeed = 0.00034 + Math.random() * 0.00016 + lv * 0.000035;
}

function handleText(text) {
  if (state.over) return;
  const ch = text.slice(-1).toLowerCase();
  if (!/^[a-z]$/.test(ch)) return;
  const next = state.typed + ch;
  const r = checkInput(next, state.word.tokens);
  if (r === 'complete') {
    state.typed = next;
    finishWord();
  } else if (r === 'prefix') {
    state.typed = next;
  } else {
    failInput();
    state.typed = '';
    ui.input.value = '';
  }
}

function burst(x, y, lv) {
  const colors = ['#fff', '#ffde2e', '#ff1010'];
  for (let i = 0; i < 22 + lv * 5; i++) {
    state.sparks.push({
      x, y,
      vx: (Math.random() - .5) * (240 + lv * 50),
      vy: -Math.random() * (190 + lv * 35),
      life: 420 + Math.random() * 180,
      age: 0,
      r: 3 + Math.random() * 5,
      c: colors[Math.floor(Math.random() * colors.length)],
    });
  }
}

function update() {
  const now = performance.now();
  const dt = Math.min(40, now - state.last);
  state.last = now;
  const elapsed = now - state.start;
  const left = Math.max(0, 45000 - elapsed);
  if (!state.over) {
    const cpuLenFactor = 6 / Math.max(4, state.cpuWord.r.length);
    state.cpuProgress += dt * state.cpuSpeed * cpuLenFactor * (1 + state.cpuPeople * 0.012);
    const cpuLen = state.cpuWord.r.length;
    const cpuChars = Math.min(cpuLen, Math.floor(state.cpuProgress * cpuLen));
    state.cpuTyped = state.cpuWord.r.slice(0, cpuChars);
    if (state.cpuProgress >= 1) cpuFinishWord();

    const force = (state.playerPeople - state.cpuPeople) * 0.000019;
    state.rope += force * dt;
    if (state.rope > 0.62 && Math.random() < 0.012) state.hit = Math.max(state.hit, .35);
    if (state.rope < -0.62 && Math.random() < 0.018) state.cpuHit = Math.max(state.cpuHit, .45);
    if (state.rope >= 1) state.over = 'win';
    if (state.rope <= -1) state.over = 'lose';
    if (left <= 0 && !state.over) {
      if (Math.abs(state.rope) < 0.05) state.over = 'draw';
      else state.over = state.rope >= 0 ? 'win' : 'lose';
    }
  }
  state.rope = Math.max(-1.08, Math.min(1.08, state.rope));
  state.hit = Math.max(0, state.hit - dt / 240);
  state.cpuHit = Math.max(0, state.cpuHit - dt / 260);
  state.shake = Math.max(0, state.shake - dt / 260);
  state.sparks = state.sparks.filter(p => {
    p.age += dt;
    p.x += p.vx * dt / 1000;
    p.y += p.vy * dt / 1000;
    p.vy += 480 * dt / 1000;
    return p.age < p.life;
  });
  draw(left);
  renderUI(left);
  requestAnimationFrame(update);
}

function strokeLine(points, width, color) {
  ctx.strokeStyle = color || '#050505';
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
  ctx.stroke();
}

function curvePoints(p1, ctl, p2, steps) {
  const points = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const u = 1 - t;
    points.push([
      u * u * p1[0] + 2 * u * t * ctl[0] + t * t * p2[0],
      u * u * p1[1] + 2 * u * t * ctl[1] + t * t * p2[1]
    ]);
  }
  return points;
}

function drawRopePath(points, width) {
  if (points.length < 2) return;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  // outline
  ctx.strokeStyle = '#050505';
  ctx.lineWidth = width + 8;
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
  ctx.stroke();
  // body
  ctx.strokeStyle = '#d8b97c';
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
  ctx.stroke();
  // shadow band on lower side
  ctx.strokeStyle = 'rgba(90,60,20,0.45)';
  ctx.lineWidth = Math.max(2, width * 0.25);
  ctx.beginPath();
  for (let i = 0; i < points.length; i++) {
    const p = points[i];
    let nx = 0, ny = 1;
    if (i < points.length - 1) {
      const np = points[i+1];
      const dx = np[0] - p[0];
      const dy = np[1] - p[1];
      const len = Math.hypot(dx, dy);
      if (len > 0.01) { nx = dy/len; ny = -dx/len; }
    }
    const ox = p[0] - nx * width * 0.22;
    const oy = p[1] - ny * width * 0.22;
    if (i === 0) ctx.moveTo(ox, oy);
    else ctx.lineTo(ox, oy);
  }
  ctx.stroke();
  // braided chevrons
  ctx.strokeStyle = '#5a3c20';
  ctx.lineWidth = Math.max(2.2, width * 0.18);
  const spacing = 13;
  let acc = 0;
  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i];
    const b = points[i + 1];
    const dx = b[0] - a[0];
    const dy = b[1] - a[1];
    const len = Math.hypot(dx, dy);
    if (len < 0.01) continue;
    const ux = dx / len, uy = dy / len;
    const nx = -uy, ny = ux;
    let pos = spacing - (acc % spacing);
    while (pos < len) {
      const cx = a[0] + ux * pos;
      const cy = a[1] + uy * pos;
      const half = width * 0.42;
      ctx.beginPath();
      ctx.moveTo(cx + nx * half - ux * 5, cy + ny * half - uy * 5);
      ctx.lineTo(cx + ux * 4, cy + uy * 4);
      ctx.lineTo(cx - nx * half - ux * 5, cy - ny * half - uy * 5);
      ctx.stroke();
      pos += spacing;
    }
    acc += len;
  }
  // highlight strip on upper side
  ctx.strokeStyle = 'rgba(255,245,210,0.55)';
  ctx.lineWidth = Math.max(2, width * 0.16);
  ctx.beginPath();
  for (let i = 0; i < points.length; i++) {
    const p = points[i];
    let nx = 0, ny = -1;
    if (i < points.length - 1) {
      const np = points[i+1];
      const dx = np[0] - p[0];
      const dy = np[1] - p[1];
      const len = Math.hypot(dx, dy);
      if (len > 0.01) { nx = dy/len; ny = -dx/len; }
    }
    const ox = p[0] + nx * width * 0.22;
    const oy = p[1] + ny * width * 0.22;
    if (i === 0) ctx.moveTo(ox, oy);
    else ctx.lineTo(ox, oy);
  }
  ctx.stroke();
  ctx.restore();
}

function drawBraidedRope(leftHand, rightHand, ropeState, tension, width) {
  const midX = (leftHand[0] + rightHand[0]) / 2;
  const midY = (leftHand[1] + rightHand[1]) / 2;
  const sag = 14 - tension * 10;
  const wave = Math.sin(performance.now() / 160) * (1 + (1 - tension) * 2);
  const controlY = midY + sag * 2 + wave;
  const points = curvePoints(leftHand, [midX, controlY], rightHand, 30);
  // dangling tails
  const tailWave = Math.sin(performance.now() / 180) * 4;
  const leftTailPoints = curvePoints(
    leftHand,
    [leftHand[0] - 32, leftHand[1] + 56],
    [leftHand[0] - 76, leftHand[1] + 102 + tailWave],
    15
  );
  const rightTailPoints = curvePoints(
    rightHand,
    [rightHand[0] + 32, rightHand[1] + 56],
    [rightHand[0] + 76, rightHand[1] + 102 - tailWave],
    15
  );
  drawRopePath(leftTailPoints, width * 0.78);
  drawRopePath(rightTailPoints, width * 0.78);
  drawRopePath(points, width);
  // central red marker (knot)
  const ropeRange = (rightHand[0] - leftHand[0]) * 0.42;
  const markerWorldX = (leftHand[0] + rightHand[0]) / 2 - ropeState * ropeRange;
  let bestT = 0.5, bestDist = Infinity;
  for (let t = 0; t <= 1; t += 0.02) {
    const u = 1 - t;
    const px = u * u * leftHand[0] + 2 * u * t * midX + t * t * rightHand[0];
    const d = Math.abs(px - markerWorldX);
    if (d < bestDist) { bestDist = d; bestT = t; }
  }
  const u = 1 - bestT;
  const mx = u * u * leftHand[0] + 2 * u * bestT * midX + bestT * bestT * rightHand[0];
  const my = u * u * leftHand[1] + 2 * u * bestT * controlY + bestT * bestT * rightHand[1];
  ctx.save();
  ctx.fillStyle = '#e60012';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.roundRect(mx - 14, my - width * 0.6, 28, width * 1.2, 6);
  ctx.fill();
  ctx.stroke();
  // hanging ribbon
  ctx.fillStyle = '#e60012';
  ctx.strokeStyle = '#050505';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(mx - 7, my + width * 0.45);
  ctx.lineTo(mx - 12, my + width * 0.45 + 20);
  ctx.lineTo(mx + 12, my + width * 0.45 + 20);
  ctx.lineTo(mx + 7, my + width * 0.45);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function drawPerson(x, y, scale, dir, effort, face) {
  const lean = effort * 26 * dir;
  const headX = x + lean * .35;
  const headY = y - 122 * scale + effort * 6;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  // head outline
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#050505';
  ctx.lineWidth = 9 * scale;
  ctx.beginPath();
  ctx.arc(headX, headY, 40 * scale, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // eyes: black dots
  ctx.fillStyle = '#050505';
  const eyeOffsetY = -4 * scale;
  ctx.beginPath();
  ctx.arc(headX - 14 * scale, headY + eyeOffsetY, 5.5 * scale, 0, Math.PI * 2);
  ctx.arc(headX + 14 * scale, headY + eyeOffsetY, 5.5 * scale, 0, Math.PI * 2);
  ctx.fill();
  // eyebrows during effort
  if (effort > 0.4) {
    ctx.strokeStyle = '#050505';
    ctx.lineWidth = 4 * scale;
    ctx.beginPath();
    ctx.moveTo(headX - 22 * scale, headY - 17 * scale);
    ctx.lineTo(headX - 7 * scale, headY - 11 * scale);
    ctx.moveTo(headX + 22 * scale, headY - 17 * scale);
    ctx.lineTo(headX + 7 * scale, headY - 11 * scale);
    ctx.stroke();
  }
  // mouth: face state
  ctx.strokeStyle = '#050505';
  ctx.lineWidth = 5 * scale;
  if (face === 'panic') {
    // round panic mouth
    ctx.fillStyle = '#050505';
    ctx.beginPath();
    ctx.ellipse(headX, headY + 18 * scale, 7 * scale, 9 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (effort > 0.55) {
    // gritted teeth zigzag
    ctx.beginPath();
    const baseY = headY + 18 * scale;
    ctx.moveTo(headX - 16 * scale, baseY);
    ctx.lineTo(headX - 9 * scale, baseY + 5 * scale);
    ctx.lineTo(headX - 3 * scale, baseY);
    ctx.lineTo(headX + 4 * scale, baseY + 5 * scale);
    ctx.lineTo(headX + 11 * scale, baseY);
    ctx.lineTo(headX + 17 * scale, baseY + 5 * scale);
    ctx.stroke();
  } else {
    // determined mouth: short line
    ctx.beginPath();
    ctx.moveTo(headX - 11 * scale, headY + 20 * scale);
    ctx.lineTo(headX + 11 * scale, headY + 20 * scale);
    ctx.stroke();
  }
  // body
  const neck = [x + lean * .15, y - 78 * scale];
  const hip = [x - lean * .12, y - 18 * scale];
  ctx.strokeStyle = '#050505';
  strokeLine([neck, hip], 8 * scale);
  // legs: braced stance for effort
  const frontFoot = [x + 38 * dir, y + 48 * scale];
  const backFoot = [x - 36 * dir, y + 48 * scale + (effort > 0.4 ? 4 : 0)];
  strokeLine([hip, frontFoot], 8 * scale);
  strokeLine([hip, backFoot], 8 * scale);
  // arms reaching forward to rope
  const hand = [x + 56 * dir, y - 68 * scale + effort * 8];
  strokeLine([neck, hand], 8 * scale);
  strokeLine([[x - 2 * dir, y - 62 * scale], [hand[0] - 8 * dir, hand[1] + 16 * scale]], 8 * scale);
  ctx.restore();
  return hand;
}

function draw(left) {
  const sx = state.shake ? (Math.random() - .5) * 10 * state.shake : 0;
  const sy = state.shake ? (Math.random() - .5) * 6 * state.shake : 0;
  ctx.save();
  ctx.translate(sx, sy);
  ctx.clearRect(-20, -20, W + 40, H + 40);
  // sky
  ctx.fillStyle = '#7d5e68';
  ctx.fillRect(0, 0, W, H);
  // ambient clouds
  ctx.fillStyle = 'rgba(76, 55, 65, .38)';
  ctx.beginPath();
  ctx.ellipse(580, 95, 210, 62, -0.26, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(170, 132, 110, .32)';
  ctx.beginPath();
  ctx.ellipse(185, 182, 300, 82, 0.2, 0, Math.PI * 2);
  ctx.fill();
  // wood floor base
  ctx.fillStyle = '#8a6a4c';
  ctx.fillRect(0, 350, W, 110);
  // horizontal grain
  ctx.strokeStyle = 'rgba(82,55,30,0.55)';
  ctx.lineWidth = 1.2;
  for (let y = 358; y < H; y += 11) {
    ctx.beginPath();
    for (let x = 0; x <= W; x += 18) {
      const variance = Math.sin(x * 0.028 + y * 0.13) * 1.6 + Math.sin(x * 0.011 - y * 0.07) * 0.8;
      if (x === 0) ctx.moveTo(x, y + variance);
      else ctx.lineTo(x, y + variance);
    }
    ctx.stroke();
  }
  // plank seams
  ctx.strokeStyle = '#3d2a1a';
  ctx.lineWidth = 2.5;
  for (let x = 120; x < W; x += 180) {
    ctx.beginPath();
    ctx.moveTo(x, 350);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  // knots
  ctx.fillStyle = '#5a3c1f';
  ctx.strokeStyle = '#2a1812';
  ctx.lineWidth = 1.5;
  const knots = [[160, 388], [380, 412], [620, 384], [780, 415], [70, 405]];
  for (const [kx, ky] of knots) {
    ctx.beginPath();
    ctx.ellipse(kx, ky, 7, 4.5, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }
  // ground top edge
  ctx.strokeStyle = '#2a1812';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, 350); ctx.lineTo(W, 350);
  ctx.stroke();

  // positions (clamp ropeShift so teams stay on canvas)
  const ropeShift = Math.max(-110, Math.min(110, -state.rope * 110));
  const playerBase = 210 + ropeShift;
  const cpuBase = 690 + ropeShift;
  const playerDisplay = Math.min(6, state.playerPeople);
  const cpuDisplay = Math.min(6, state.cpuPeople);
  const playerExtra = Math.max(0, state.playerPeople - playerDisplay);
  const cpuExtra = Math.max(0, state.cpuPeople - cpuDisplay);
  const pEffort = .15 + state.hit * .85;
  const cEffort = .2 + state.cpuHit * .65;
  const pHands = [];
  const cHands = [];
  for (let i = playerDisplay - 1; i >= 0; i--) {
    pHands.push(drawPerson(playerBase - i * 30, 316, .82, 1, i ? .15 : pEffort, state.over === 'lose' ? 'panic' : 'normal'));
  }
  for (let i = cpuDisplay - 1; i >= 0; i--) {
    cHands.push(drawPerson(cpuBase + i * 28, 316, .76, -1, i ? .15 : cEffort, state.over === 'win' ? 'panic' : 'normal'));
  }
  // extras badge
  if (playerExtra > 0) {
    ctx.fillStyle = '#ffeb35';
    ctx.strokeStyle = '#050505';
    ctx.lineWidth = 5;
    ctx.font = '900 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.strokeText('+' + playerExtra, playerBase - (playerDisplay - 1) * 30 - 26, 296);
    ctx.fillText('+' + playerExtra, playerBase - (playerDisplay - 1) * 30 - 26, 296);
  }
  if (cpuExtra > 0) {
    ctx.fillStyle = '#9fd0ff';
    ctx.strokeStyle = '#050505';
    ctx.lineWidth = 5;
    ctx.font = '900 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.strokeText('+' + cpuExtra, cpuBase + (cpuDisplay - 1) * 28 + 26, 296);
    ctx.fillText('+' + cpuExtra, cpuBase + (cpuDisplay - 1) * 28 + 26, 296);
  }
  // rope
  const tension = Math.max(pEffort, cEffort);
  if (pHands[0] && cHands[0]) {
    drawBraidedRope(pHands[0], cHands[0], state.rope, tension, 20);
  }

  // people count labels
  ctx.font = '900 28px sans-serif';
  ctx.lineWidth = 7;
  ctx.strokeStyle = '#050505';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.strokeText('YOU ' + state.playerPeople + '人', 24, 42);
  ctx.fillText('YOU ' + state.playerPeople + '人', 24, 42);
  ctx.textAlign = 'right';
  ctx.strokeText('CPU ' + state.cpuPeople + '人', W - 24, 42);
  ctx.fillText('CPU ' + state.cpuPeople + '人', W - 24, 42);

  // DANGER (player losing)
  if (state.rope < -0.62) {
    ctx.font = '1000 42px sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 8;
    ctx.strokeStyle = '#fff';
    ctx.fillStyle = '#ff1010';
    ctx.strokeText('DANGER!', W / 2, 96);
    ctx.fillText('DANGER!', W / 2, 96);
  }
  // CHANCE (player winning)
  if (state.rope > 0.62) {
    ctx.font = '1000 42px sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 8;
    ctx.strokeStyle = '#fff';
    ctx.fillStyle = '#3d7cff';
    ctx.strokeText('CHANCE!', W / 2, 96);
    ctx.fillText('CHANCE!', W / 2, 96);
  }
  // 応援ラッシュ
  if (performance.now() < state.rushUntil) {
    ctx.font = '1000 38px sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 7;
    ctx.strokeStyle = '#050505';
    ctx.fillStyle = '#ffeb35';
    ctx.strokeText('応援ラッシュ', W / 2, 132);
    ctx.fillText('応援ラッシュ', W / 2, 132);
  }
  // pull-success burst text
  if (state.hit > .25) {
    ctx.font = '1000 48px sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 8;
    ctx.strokeStyle = '#fff';
    ctx.fillStyle = '#e60012';
    ctx.strokeText('グイッ！', 326, 112);
    ctx.fillText('グイッ！', 326, 112);
  }
  if (state.cpuHit > .35) {
    ctx.font = '1000 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 7;
    ctx.strokeStyle = '#fff';
    ctx.fillStyle = '#3d7cff';
    ctx.strokeText('ぐぬぬ！', 580, 112);
    ctx.fillText('ぐぬぬ！', 580, 112);
  }
  // particles
  for (const p of state.sparks) {
    const a = 1 - p.age / p.life;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.c;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function renderUI(left) {
  const rushLeft = Math.max(0, state.rushUntil - performance.now());
  ui.combo.textContent = state.combo;
  ui.power.textContent = state.playerPeople + '人';
  ui.time.textContent = (left / 1000).toFixed(1);
  ui.time.style.color = left < 8000 ? '#ff3030' : '#ffeb35';
  ui.meter.style.width = Math.min(100, Math.abs(state.rope) * 100) + '%';
  ui.meter.style.background = state.rope >= 0 ? 'linear-gradient(90deg, #ff1010, #ffde2e)' : 'linear-gradient(90deg, #3d7cff, #ff3030)';
  ui.badge.textContent = 'L' + state.word.lv + ' / +' + state.word.lv + '人';
  ui.kana.textContent = state.word.k;
  ui.typed.textContent = state.typed || '_';
  const hint = buildHint(state.typed, state.word.tokens);
  ui.roma.innerHTML = '<span class="typed">' + state.typed + '</span>' + hint;
  ui.rush.textContent = rushLeft > 0 ? '応援ラッシュ ' + (rushLeft / 1000).toFixed(1) + '秒' : (performance.now() < state.messageUntil ? state.message : '5 COMBOで応援ラッシュ');

  ui.cpuBadge.textContent = 'L' + state.cpuWord.lv + ' / +' + state.cpuWord.lv + '人';
  ui.cpuKana.textContent = state.cpuWord.k;
  ui.cpuRoma.innerHTML = '<span class="typed">' + state.cpuTyped + '</span>' + state.cpuWord.r.slice(state.cpuTyped.length);
  ui.cpuProgress.style.width = Math.min(100, state.cpuProgress * 100) + '%';
  if (state.over) {
    ui.overlay.style.display = 'flex';
    if (state.over === 'win') {
      ui.result.textContent = 'WIN!';
      ui.resultSub.textContent = '相手を自陣へ引き込んだ';
    } else if (state.over === 'lose') {
      ui.result.textContent = 'LOSE...';
      ui.resultSub.textContent = '相手陣へ引き込まれた。もう一回！';
    } else {
      ui.result.textContent = 'DRAW';
      ui.resultSub.textContent = '時間切れ・引き分け！';
    }
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Backspace') {
    state.typed = '';
    ui.input.value = '';
    e.preventDefault();
    return;
  }
  if (/^[a-zA-Z]$/.test(e.key)) {
    handleText(e.key);
    e.preventDefault();
  }
});
ui.input.addEventListener('input', e => handleText(e.target.value));
document.getElementById('app').addEventListener('pointerdown', focusInput);
ui.retry.addEventListener('click', reset);

window.__TSUNAHIKI_DEBUG__ = {
  words: WORDS,
  tokenizeRoma,
  checkInput,
  buildHint,
  getState: () => ({
    combo: state.combo,
    rope: state.rope,
    playerPeople: state.playerPeople,
    cpuPeople: state.cpuPeople,
    word: state.word,
    typed: state.typed,
    over: state.over,
    cpuWord: state.cpuWord,
    cpuTyped: state.cpuTyped,
    cpuProgress: state.cpuProgress,
  }),
};
reset();
requestAnimationFrame(update);
</script>
</body>
</html>
